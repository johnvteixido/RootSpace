name: '🐛 Bug Report'
description: Report a bug to help us improve RootSpace
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior.
  - type: input
    id: version
    attributes:
      label: Node.js Version
      placeholder: v20.x.x
    validations:
      required: true
